name: Bug Report
description: Report a problem with Agent Resume Desktop
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please do **not** paste API keys, full conversation transcripts, or sensitive file paths.
  - type: input
    id: version
    attributes:
      label: Desktop app version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "15.0"
    validations:
      required: true
  - type: dropdown
    id: llm
    attributes:
      label: LLM configured?
      options:
        - "No"
        - "Yes"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs (optional)
      description: From Settings → Usage, or Console — redact secrets